server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1000;
    gzip_disable "msie6";

    # ── Rate limiting zones ──────────────────────────────────────────────────────
    # Global: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    # Auth routes: stricter — 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=auth:1m rate=5r/m;

    # ── Cache static assets ─────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML — no cache (always fresh for SPA) ───────────────────────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── SPA routing ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Don't log static asset misses
        access_log off;
    }

    # ── API proxy ────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://nuvora-server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header X-User-Id $http_x_user_id;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffers
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Rate limiting on auth routes
        limit_req zone=auth burst=10 nodelay;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$http_origin";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-Id, X-Idempotency-Key";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ── WebSocket proxy ─────────────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://nuvora-server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ── Health & metrics (internal only — deny external access) ───────────────
    location /api/v1/health {
        proxy_pass http://nuvora-server:3000;
        proxy_set_header Host $host;
        access_log off;
    }

    location /api/v1/metrics {
        # In production: restrict to internal network / prometheus IP
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://nuvora-server:3000;
        proxy_set_header Host $host;
    }

    # ── Block sensitive paths ──────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Block access to hidden files ──────────────────────────────────────────
    location ~ /\.git {
        deny all;
    }

    # ── Error pages ────────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}